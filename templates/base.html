<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Homework Makeup{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1><a href="/">Homework Makeup</a></h1>
      <p class="tagline">Classroom absence homework pickup</p>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Running on the classroom server. Ask your teacher if you need help.</p>
    </div>
  </footer>
</body>
</html>
