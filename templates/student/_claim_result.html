<div class="claim-result">
  <p class="status-note success">
    Your unique code is <strong>{{ claim.token }}</strong>.
  </p>

  <div class="claim-assets">
    <div class="claim-qr">
      <img
        src="{{ claim.qr_path }}"
        alt="QR code for claim {{ claim.token }}"
        width="180"
        height="180"
      >
      <p class="help-text">Teachers can scan this to verify your claim.</p>
    </div>

    <div class="claim-actions">
      <p><strong>{{ claim.assignment_title }}</strong></p>
      <p class="assignment-meta">
        Period {{ claim.period }} · Absence {{ claim.absence_date }}
      </p>
      <a class="download-button" href="{{ claim.download_path }}">
        Download watermarked PDF
      </a>
      <p class="help-text">
        The PDF is watermarked with your name and code
        <strong>{{ claim.token }}</strong>.
      </p>
    </div>
  </div>
</div>
